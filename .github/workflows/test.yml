name: Testing

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: dbee

env:
  GO_VERSION: "1.23.x"
  NVIM_PERF_VERSION: "v0.12.2"

jobs:
  go-unit-test:
    runs-on: ubuntu-22.04
    name: Go Unit Test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go v${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: v${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: ./dbee/go.sum
      # exclude tests folder (not used for unit tests)
      - name: Run Unit Tests
        run: go test $(go list ./... | grep -v tests) -v

  lua-headless-regression:
    runs-on: ubuntu-22.04
    name: Lua Headless Regression (${{ matrix.script }})
    defaults:
      run:
        working-directory: .
    strategy:
      fail-fast: false
      matrix:
        script:
          - check_query_splitter.lua
          - check_query_under_cursor.lua
          - check_variables.lua
          - check_execute_script.lua
          - check_editor_variables.lua
          - check_editor_error_jump.lua
          - check_explain_plan.lua
          - check_call_cancel_retry.lua
          - check_editor_call_routing.lua
          - check_events_dispatch_resilience.lua
          - check_actions_entrypoints.lua
          - check_actions_recovery.lua
          - check_auto_reconnect.lua
          - check_adapter_diagnostics.lua
          - check_schema_filter.lua
          - check_handler_schema_filter.lua
          - check_adapter_schema_filter.lua
          - check_result_progress_hints.lua
          - check_result_restore_elapsed.lua
          - check_result_error_kinds.lua
          - check_lsp_alias_completion.lua
          - check_lsp_schema_alias_completion.lua
          - check_lsp_alias_rebinding.lua
          - check_lsp_schema_cache_optimization.lua
          - check_lsp_disk_cache_safety.lua
          - check_lsp_async_completion.lua
          - check_lsp_diagnostics_correctness.lua
          - check_lsp_diagnostics_debounce.lua
          - check_lsp_schema_filter_lazy.lua
          - check_run_note_queries_opts.lua
          - check_cancel_confirm_prompt.lua
          - check_notifications.lua
          - check_winbar_format.lua
          - check_call_log_display.lua
          - check_note_cycling.lua
          - check_result_export.lua
          - check_drawer_yank.lua
          - check_pane_jump.lua
          - check_drawer_filter.lua
          - check_structure_lazy.lua
          - check_notes_picker.lua
          - check_connection_lifecycle.lua
          - check_connection_coordination.lua
          - check_wizard_input_visible.lua
          - check_connection_wizard.lua
          - check_filesource_persistence.lua
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim ${{ env.NVIM_PERF_VERSION }}
        run: |
          curl -fsSLO https://github.com/neovim/neovim/releases/download/${NVIM_PERF_VERSION}/nvim-linux-x86_64.tar.gz
          tar xzf nvim-linux-x86_64.tar.gz
          echo "${PWD}/nvim-linux-x86_64/bin" >> "${GITHUB_PATH}"
      - name: Bootstrap pinned Lua headless plugins
        run: |
          # nvim-neotest/nvim-nio pin ownership lives in ci/headless/perf_bootstrap.mk.
          make perf-bootstrap
          make perf-bootstrap-print
      - name: Run Headless Lua Check
        run: |
          NUI_NVIM_DIR="$(make perf-bootstrap-print | awk -F= '/^NUI_NVIM_DIR=/{print $2}')"
          NIO_NVIM_DIR="$(make perf-bootstrap-print | awk -F= '/^NIO_NVIM_DIR=/{print $2}')"
          nvim --headless -u NONE -i NONE -n \
            --cmd "set rtp^=${NIO_NVIM_DIR} | set rtp^=${NUI_NVIM_DIR} | set rtp+=${GITHUB_WORKSPACE}" \
            -c "luafile ${GITHUB_WORKSPACE}/ci/headless/${{ matrix.script }}"

  lua-real-nui-perf-advisory:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            archive: nvim-linux-x86_64.tar.gz
            dir: nvim-linux-x86_64
          - os: macos-14
            platform: macos
            archive: nvim-macos-arm64.tar.gz
            dir: nvim-macos-arm64
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    name: Lua Real-Nui Perf Advisory (${{ matrix.platform }})
    env:
      PERF_PLUGIN_ROOT: ${{ runner.temp }}/nvim-dbee-perf-plugins
      DRAW01_PERF_ARTIFACT_DIR: ${{ runner.temp }}/draw01-perf/${{ matrix.platform }}
      DRAW01_PERF_SUMMARY_PATH: ${{ runner.temp }}/draw01-perf/${{ matrix.platform }}/draw01-perf-summary-${{ matrix.platform }}.txt
      DRAW01_PERF_TRACE_PATH: ${{ runner.temp }}/draw01-perf/${{ matrix.platform }}/draw01-perf-trace-${{ matrix.platform }}.json
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim ${{ env.NVIM_PERF_VERSION }}
        run: |
          curl -fsSLO https://github.com/neovim/neovim/releases/download/${{ env.NVIM_PERF_VERSION }}/${{ matrix.archive }}
          tar xzf ${{ matrix.archive }}
          echo "${PWD}/${{ matrix.dir }}/bin" >> "${GITHUB_PATH}"
      - name: Bootstrap pinned perf plugins
        run: make perf-bootstrap
      - name: Rerun preserved DRAW-01 smoke suites
        run: |
          nvim --headless -u NONE -i NONE -n \
            --cmd "set rtp^=${PERF_PLUGIN_ROOT}/nui.nvim | set rtp+=${GITHUB_WORKSPACE}" \
            -c "luafile ${GITHUB_WORKSPACE}/ci/headless/check_drawer_filter.lua"
          nvim --headless -u NONE -i NONE -n \
            --cmd "set rtp^=${PERF_PLUGIN_ROOT}/nui.nvim | set rtp+=${GITHUB_WORKSPACE}" \
            -c "luafile ${GITHUB_WORKSPACE}/ci/headless/check_structure_lazy.lua"
      - name: Run advisory real-nui perf harness
        run: DRAW01_PERF_GATE_MODE=advisory make perf PERF_PLATFORM=${{ matrix.platform }}
      - name: Assert advisory perf artifacts exist
        if: always()
        run: |
          test -s "${DRAW01_PERF_SUMMARY_PATH}"
          test -s "${DRAW01_PERF_TRACE_PATH}"
      - name: Upload advisory perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draw01-real-nui-perf-${{ matrix.platform }}
          path: |
            ${{ env.DRAW01_PERF_SUMMARY_PATH }}
            ${{ env.DRAW01_PERF_TRACE_PATH }}
          if-no-files-found: error
      - name: Advisory promotion seam
        if: always()
        run: |
          echo "Local macOS replay: ART_DIR=\$(mktemp -d) DRAW01_PERF_GATE_MODE=advisory DRAW01_PERF_ARTIFACT_DIR=\$ART_DIR DRAW01_PERF_SUMMARY_PATH=\$ART_DIR/draw01-perf-summary-macos.txt DRAW01_PERF_TRACE_PATH=\$ART_DIR/draw01-perf-trace-macos.json make perf PERF_PLATFORM=macos"
          echo "Local Linux replay: ART_DIR=\$(mktemp -d) DRAW01_PERF_GATE_MODE=advisory DRAW01_PERF_ARTIFACT_DIR=\$ART_DIR DRAW01_PERF_SUMMARY_PATH=\$ART_DIR/draw01-perf-summary-linux.txt DRAW01_PERF_TRACE_PATH=\$ART_DIR/draw01-perf-trace-linux.json make perf PERF_PLATFORM=linux"
          echo "CI-shaped replay: act -W .github/workflows/test.yml -j lua-real-nui-perf-advisory"
          echo "Phase 9 perf remains advisory in this workflow until ci/headless/perf_thresholds.lua is frozen."
          echo "Promotion flips DRAW01_PERF_GATE_MODE=blocking in the same change that freezes Linux and macOS thresholds."
          echo "Once blocking is enabled, either the Linux or macOS perf lane failing blocks the release."

  lua-lsp-perf-advisory:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            archive: nvim-linux-x86_64.tar.gz
            dir: nvim-linux-x86_64
          - os: macos-14
            platform: macos
            archive: nvim-macos-arm64.tar.gz
            dir: nvim-macos-arm64
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    name: Lua LSP Perf Advisory (${{ matrix.platform }})
    env:
      PERF_PLUGIN_ROOT: ${{ runner.temp }}/nvim-dbee-perf-plugins
      LSP01_PERF_ARTIFACT_DIR: ${{ runner.temp }}/lsp01-perf/${{ matrix.platform }}
      LSP01_PERF_SUMMARY_PATH: ${{ runner.temp }}/lsp01-perf/${{ matrix.platform }}/lsp01-summary.txt
      LSP01_PERF_TRACE_PATH: ${{ runner.temp }}/lsp01-perf/${{ matrix.platform }}/lsp01-trace.json
      LSP01_PERF_STATE_HOME: ${{ runner.temp }}/lsp01-perf/${{ matrix.platform }}/state-home
      XDG_STATE_HOME: ${{ runner.temp }}/lsp01-perf/${{ matrix.platform }}/state-home
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim ${{ env.NVIM_PERF_VERSION }}
        run: |
          curl -fsSLO https://github.com/neovim/neovim/releases/download/${{ env.NVIM_PERF_VERSION }}/${{ matrix.archive }}
          tar xzf ${{ matrix.archive }}
          echo "${PWD}/${{ matrix.dir }}/bin" >> "${GITHUB_PATH}"
      - name: Bootstrap pinned perf plugins
        run: make perf-bootstrap
      - name: Rerun preserved LSP semantic checks
        run: |
          NIO_NVIM_DIR="$(make perf-bootstrap-print | awk -F= '/^NIO_NVIM_DIR=/{print $2}')"
          nvim --headless -u NONE -i NONE -n \
            --cmd "set rtp^=${NIO_NVIM_DIR} | set rtp+=${GITHUB_WORKSPACE}" \
            -c "luafile ${GITHUB_WORKSPACE}/ci/headless/check_lsp_alias_completion.lua"
          nvim --headless -u NONE -i NONE -n \
            --cmd "set rtp^=${NIO_NVIM_DIR} | set rtp+=${GITHUB_WORKSPACE}" \
            -c "luafile ${GITHUB_WORKSPACE}/ci/headless/check_lsp_schema_alias_completion.lua"
          nvim --headless -u NONE -i NONE -n \
            --cmd "set rtp^=${NIO_NVIM_DIR} | set rtp+=${GITHUB_WORKSPACE}" \
            -c "luafile ${GITHUB_WORKSPACE}/ci/headless/check_lsp_alias_rebinding.lua"
      - name: Run advisory LSP perf harness
        run: |
          mkdir -p "${LSP01_PERF_ARTIFACT_DIR}"
          set +e
          LSP01_PERF_GATE_MODE=advisory make perf-lsp PERF_PLATFORM=${{ matrix.platform }} 2>&1 | tee "${LSP01_PERF_ARTIFACT_DIR}/lsp01-stdout.log"
          status=${PIPESTATUS[0]}
          set -e
          exit "${status}"
      - name: Run Phase 11 LSP semantic checks
        run: |
          NIO_NVIM_DIR="$(make perf-bootstrap-print | awk -F= '/^NIO_NVIM_DIR=/{print $2}')"
          printf '\n' | tee -a "${LSP01_PERF_ARTIFACT_DIR}/lsp01-stdout.log"
          for script in \
            check_lsp_schema_cache_optimization.lua \
            check_lsp_disk_cache_safety.lua \
            check_lsp_async_completion.lua \
            check_lsp_diagnostics_correctness.lua \
            check_lsp_diagnostics_debounce.lua
          do
            nvim --headless -u NONE -i NONE -n \
              --cmd "set rtp^=${NIO_NVIM_DIR} | set rtp+=${GITHUB_WORKSPACE}" \
              -c "luafile ${GITHUB_WORKSPACE}/ci/headless/${script}" 2>&1 | tee -a "${LSP01_PERF_ARTIFACT_DIR}/lsp01-stdout.log"
            printf '\n' | tee -a "${LSP01_PERF_ARTIFACT_DIR}/lsp01-stdout.log"
          done
      - name: Assert advisory LSP perf artifacts exist
        if: always()
        run: |
          test -s "${LSP01_PERF_ARTIFACT_DIR}/lsp01-stdout.log"
          test -s "${LSP01_PERF_SUMMARY_PATH}"
          test -s "${LSP01_PERF_TRACE_PATH}"
      - name: Upload LSP advisory summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-lsp-perf-threshold-summary
          path: |
            ${{ env.LSP01_PERF_ARTIFACT_DIR }}/lsp01-stdout.log
            ${{ env.LSP01_PERF_SUMMARY_PATH }}
          if-no-files-found: error
      - name: Upload LSP advisory trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-lsp-perf-threshold-trace
          path: ${{ env.LSP01_PERF_TRACE_PATH }}
          if-no-files-found: error
      - name: Validate LSP advisory markers
        if: always()
        run: |
          log="${LSP01_PERF_ARTIFACT_DIR}/lsp01-stdout.log"
          grep -q '^LSP01_PLATFORM_AUTHENTIC=true$' "${log}"
          grep -q '^LSP01_PUBLISHABLE=true$' "${log}"
          grep -q '^LSP01_SCENARIOS_COUNT=33$' "${log}"
          ! grep -q '_SENTINEL_OK=false' "${log}"
          test "$(grep -c '^LSP01_.*_SENTINEL_OK=true$' "${log}")" -eq 33
          test "$(grep -c '^LSP01_.*_NO_STALE_CLIENTS=true$' "${log}")" -eq 18
          ! grep -q '^LSP01_.*_NO_STALE_CLIENTS=false$' "${log}"
          test "$(grep -c '^LSP01_DIAGNOSTICS_DIDCHANGE_COMPUTE_ONLY=true$' "${log}")" -eq 3
          ! grep -q '^LSP01_DIAGNOSTICS_DIDCHANGE_COMPUTE_ONLY=false$' "${log}"
          grep -q '^LSP01_COLD_DISK_DEFERRED_CALLBACK_COUNT=0$' "${log}"
          grep -q '^LSP01_WARM_DISK_DEFERRED_CALLBACK_COUNT=0$' "${log}"
          grep -q '^LSP01_METADATA_FALLBACK_DEFERRED_CALLBACK_COUNT=1$' "${log}"
          grep -q '^LSP01_COMPLETION_COLUMN_MISS_SYNC_LEGACY_STATUS=historical$' "${log}"
          grep -q '^LSP01_COMPLETION_COLUMN_MISS_ASYNC_FIRST_SENTINEL_OK=true$' "${log}"
          grep -q '^LSP01_COMPLETION_COLUMN_MISS_ASYNC_WARM_SENTINEL_OK=true$' "${log}"
          grep -q '^LSP01_COMPLETION_COLUMN_MISS_ASYNC_FIRST_INCOMPLETE=true$' "${log}"
          grep -q '^LSP01_COMPLETION_COLUMN_MISS_ASYNC_STALE_DROPPED=true$' "${log}"
          grep -q '^LSP01_COMPLETION_COLUMN_MISS_ASYNC_AUTO_RETRIGGER_OK=true$' "${log}"
          grep -q '^LSP01_STARTUP_LARGE_DISK_CACHE_10000_SENTINEL_OK=true$' "${log}"
          grep -q '^LSP11_DISK_LOAD_BOUNDED=true$' "${log}"
          grep -q '^LSP11_DISK_DISCOVERY_BOUNDED=true$' "${log}"
          grep -q '^LSP11_DISK_DEFERRED_GENERATION_FENCED=true$' "${log}"
          grep -q '^LSP11_DISK_CORRUPT_RECOVERY_OK=true$' "${log}"
          grep -q '^LSP11_DISK_INDEX_CORRUPT_RECOVERY_OK=true$' "${log}"
          grep -q '^LSP11_DISK_DEFERRED_PRUNE_DRAINED=true$' "${log}"
          grep -q '^LSP11_ASYNC_AUTO_RETRIGGER_OK=true$' "${log}"
          grep -q '^LSP11_ASYNC_PAYLOAD_ERROR_HANDLED=true$' "${log}"
          grep -q '^LSP11_ASYNC_MATERIALIZATION_PROBE_CHAIN_OK=true$' "${log}"
          grep -q '^LSP11_ASYNC_DEDUPE_MATERIALIZATION_AWARE=true$' "${log}"
          grep -q '^LSP11_DIAGNOSTIC_NAMESPACE_OK=true$' "${log}"
          grep -q '^LSP11_DIAGNOSTICS_SINGLE_NAMESPACE_OWNED=true$' "${log}"
          grep -Eq '^ARCH14_PERF_LSP_SCHEMA_DOT_OK=(true|unfrozen)$' "${log}"
          grep -Eq '^ARCH14_PERF_DRAWER_FILTER_SCOPED_OK=(true|unfrozen)$' "${log}"
          grep -Eq '^LSP01_REAL_LSP_PERF_ALL_PASS=(true|unfrozen)$' "${log}"
      - name: LSP advisory promotion seam
        if: always()
        run: |
          echo "Local macOS replay: ART_DIR=\$(mktemp -d) LSP01_PERF_GATE_MODE=advisory LSP01_PERF_ARTIFACT_DIR=\$ART_DIR LSP01_PERF_SUMMARY_PATH=\$ART_DIR/lsp01-summary.txt LSP01_PERF_TRACE_PATH=\$ART_DIR/lsp01-trace.json LSP01_PERF_STATE_HOME=\$ART_DIR/state-home make perf-lsp PERF_PLATFORM=macos"
          echo "Linux replay must run on native Linux or in CI: act -W .github/workflows/test.yml -j lua-lsp-perf-advisory"
          echo "Phase 10 LSP perf remains advisory in this workflow until ci/headless/lsp_perf_thresholds.lua is frozen."
          echo "Promotion requires four weeks at >=95% pass rate per platform, freezes Linux and macOS thresholds, then flips LSP01_PERF_GATE_MODE=blocking."
          echo "Once blocking is enabled, either the Linux or macOS LSP perf lane failing blocks the release."

  phase13-ux13-rollup-gate:
    needs: lua-lsp-perf-advisory
    if: always()
    runs-on: ubuntu-22.04
    name: Phase 13 UX13 Rollup Gate
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim ${{ env.NVIM_PERF_VERSION }}
        run: |
          curl -fsSLO https://github.com/neovim/neovim/releases/download/${NVIM_PERF_VERSION}/nvim-linux-x86_64.tar.gz
          tar xzf nvim-linux-x86_64.tar.gz
          echo "${PWD}/nvim-linux-x86_64/bin" >> "${GITHUB_PATH}"
      - name: Download LSP advisory evidence
        uses: actions/download-artifact@v4
        with:
          pattern: "*-lsp-perf-threshold-summary"
          path: ${{ runner.temp }}/lsp01-perf-threshold-summary
      - name: Validate UX13 rollups
        run: |
          set -eu
          for platform in linux macos; do
            log="${RUNNER_TEMP}/lsp01-perf-threshold-summary/${platform}-lsp-perf-threshold-summary/lsp01-stdout.log"
            test -s "${log}"
            UX13_ROLLUP_LOG="${log}" nvim --headless -u NONE -i NONE -n \
              --cmd "set rtp+=${GITHUB_WORKSPACE}" \
              -c "luafile ${GITHUB_WORKSPACE}/ci/headless/check_ux13_rollup.lua"
          done

  phase14-arch14-rollup-gate:
    needs: lua-lsp-perf-advisory
    if: always()
    runs-on: ubuntu-22.04
    name: Phase 14 ARCH14 Rollup Gate
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim ${{ env.NVIM_PERF_VERSION }}
        run: |
          curl -fsSLO https://github.com/neovim/neovim/releases/download/${NVIM_PERF_VERSION}/nvim-linux-x86_64.tar.gz
          tar xzf nvim-linux-x86_64.tar.gz
          echo "${PWD}/nvim-linux-x86_64/bin" >> "${GITHUB_PATH}"
      - name: Download LSP advisory evidence
        uses: actions/download-artifact@v4
        with:
          pattern: "*-lsp-perf-threshold-summary"
          path: ${{ runner.temp }}/lsp01-perf-threshold-summary
      - name: Validate ARCH14 rollups
        run: |
          set -eu
          for platform in linux macos; do
            log="${RUNNER_TEMP}/lsp01-perf-threshold-summary/${platform}-lsp-perf-threshold-summary/lsp01-stdout.log"
            test -s "${log}"
            ARCH14_ROLLUP_LOG="${log}" nvim --headless -u NONE -i NONE -n \
              --cmd "set rtp+=${GITHUB_WORKSPACE}" \
              -c "luafile ${GITHUB_WORKSPACE}/ci/headless/check_arch14_rollup.lua"
          done

  bootstrap-testcontainers:
    runs-on: ubuntu-22.04
    name: Bootstrap Testcontainers
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: generate-matrix
        run: |
          # create a JSON object with the adapter names to bootstrap matrix with.
          matrix=$(find tests/integration -name '*_integration_test.go' -exec basename {} \; \
            | sed 's/_integration_test.go//' \
            | jq -scR 'split("\n") | map(select(length > 0)) | {adapter: .}')
          echo "matrix=$matrix" | tee $GITHUB_OUTPUT

  go-integration-test:
    needs: bootstrap-testcontainers
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      TESTCONTAINERS_RYUK_DISABLED: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.bootstrap-testcontainers.outputs.matrix) }}
    name: Go Integration Test (${{ matrix.adapter }})
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go v${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: ./dbee/go.sum
      - name: Run Integration Tests
        run: sudo go test ./tests/integration/${{ matrix.adapter }}_integration_test.go -v
