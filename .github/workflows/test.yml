name: Testing

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: dbee

env:
  GO_VERSION: "1.23.x"

jobs:
  go-unit-test:
    runs-on: ubuntu-22.04
    name: Go Unit Test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go v${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: v${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: ./dbee/go.sum
      # exclude tests folder (not used for unit tests)
      - name: Run Unit Tests
        run: go test $(go list ./... | grep -v tests) -v

  lua-headless-regression:
    runs-on: ubuntu-22.04
    name: Lua Headless Regression (${{ matrix.script }})
    defaults:
      run:
        working-directory: .
    strategy:
      fail-fast: false
      matrix:
        script:
          - check_query_splitter.lua
          - check_query_under_cursor.lua
          - check_variables.lua
          - check_execute_script.lua
          - check_editor_variables.lua
          - check_editor_error_jump.lua
          - check_explain_plan.lua
          - check_call_cancel_retry.lua
          - check_editor_call_routing.lua
          - check_events_dispatch_resilience.lua
          - check_actions_entrypoints.lua
          - check_actions_recovery.lua
          - check_auto_reconnect.lua
          - check_adapter_diagnostics.lua
          - check_result_progress_hints.lua
          - check_result_restore_elapsed.lua
          - check_result_error_kinds.lua
          - check_lsp_alias_completion.lua
          - check_lsp_schema_alias_completion.lua
          - check_lsp_alias_rebinding.lua
          - check_run_note_queries_opts.lua
          - check_cancel_confirm_prompt.lua
          - check_notifications.lua
          - check_winbar_format.lua
          - check_call_log_display.lua
          - check_note_cycling.lua
          - check_result_export.lua
          - check_drawer_yank.lua
          - check_pane_jump.lua
          - check_drawer_filter.lua
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim
        run: |
          curl -fsSLO https://github.com/neovim/neovim/releases/download/v0.11.6/nvim-linux-x86_64.tar.gz
          tar xzf nvim-linux-x86_64.tar.gz
          echo "${PWD}/nvim-linux-x86_64/bin" >> "${GITHUB_PATH}"
      - name: Install nui.nvim (future DRAW-01 real-nui perf harness scaffolding)
        run: |
          git clone https://github.com/MunifTanjim/nui.nvim "${RUNNER_TEMP}/nui.nvim"
          git -C "${RUNNER_TEMP}/nui.nvim" checkout de740991c12411b663994b2860f1a4fd0937c130
      - name: Run Headless Lua Check
        run: |
          nvim --headless -u NONE -i NONE -n \
            --cmd "set rtp^=${RUNNER_TEMP}/nui.nvim | set rtp+=${GITHUB_WORKSPACE}" \
            -c "luafile ${GITHUB_WORKSPACE}/ci/headless/${{ matrix.script }}"

  bootstrap-testcontainers:
    runs-on: ubuntu-22.04
    name: Bootstrap Testcontainers
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: generate-matrix
        run: |
          # create a JSON object with the adapter names to bootstrap matrix with.
          matrix=$(find tests/integration -name '*_integration_test.go' -exec basename {} \; \
            | sed 's/_integration_test.go//' \
            | jq -scR 'split("\n") | map(select(length > 0)) | {adapter: .}')
          echo "matrix=$matrix" | tee $GITHUB_OUTPUT

  go-integration-test:
    needs: bootstrap-testcontainers
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      TESTCONTAINERS_RYUK_DISABLED: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.bootstrap-testcontainers.outputs.matrix) }}
    name: Go Integration Test (${{ matrix.adapter }})
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go v${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache-dependency-path: ./dbee/go.sum
      - name: Run Integration Tests
        run: sudo go test ./tests/integration/${{ matrix.adapter }}_integration_test.go -v
